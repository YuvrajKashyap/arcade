<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Geometry Dash thumbnail</title>
  <desc id="desc">A neon cube runner jumping over spikes in a geometric arcade level.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2920a9"/>
      <stop offset=".52" stop-color="#2364ea"/>
      <stop offset="1" stop-color="#16d2ce"/>
    </linearGradient>
    <linearGradient id="cube" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff25a"/>
      <stop offset=".48" stop-color="#2eeaff"/>
      <stop offset="1" stop-color="#8651ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <g opacity=".26" fill="none" stroke="#fff" stroke-width="2">
